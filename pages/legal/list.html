<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>法人证件申请 - 列表</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<div class="page-container">

  <!-- Toast 轻提示容器 -->
  <div id="toastContainer" class="toast-container"></div>

  <script>
    if (window.parent) {
      window.parent.postMessage({type:'breadcrumb', text:'法人证件申请 <span>/</span> 列表'}, '*');
    }
  </script>

  <div class="page-title">法人证件申请列表</div>

  <div class="search-area">
    <div class="search-row">
      <div class="search-item">
        <label>法人姓名：</label>
        <input type="text" id="sName" placeholder="请输入法人姓名">
      </div>
      <div class="search-item">
        <label>申请地：</label>
        <select id="sRegion">
          <option value="">全部</option>
          <option value="北京">北京</option>
          <option value="上海">上海</option>
          <option value="广州">广州</option>
          <option value="深圳">深圳</option>
        </select>
      </div>
      <div class="search-item">
        <label>档案类型：</label>
        <select id="sArchType">
          <option value="">全部</option>
          <option value="身份证">身份证</option>
          <option value="护照">护照</option>
          <option value="营业执照">营业执照</option>
          <option value="其他证件">其他证件</option>
        </select>
      </div>
      <div class="search-item">
        <label>状态：</label>
        <select id="sStatus">
          <option value="">全部</option>
          <option value="初始">初始</option>
          <option value="已提交">已提交</option>
          <option value="审核中">审核中</option>
          <option value="已审核">已审核</option>
          <option value="已取消">已取消</option>
        </select>
      </div>
    </div>
    <div class="search-actions">
      <button class="btn btn-primary" onclick="doSearch()">查询</button>
      <button class="btn" onclick="resetSearch()">重置</button>
    </div>
    <div class="search-active-tags" id="searchTags" style="display:none;"></div>
  </div>

  <div class="table-area">
    <div class="table-toolbar">
      <button class="btn btn-primary" onclick="goAdd()">+ 新增申请</button>
      <button class="btn" onclick="doImport()">导入</button>
      <button class="btn btn-success" onclick="doBatchSubmit()">批量提交</button>
      <button class="btn btn-warning" onclick="doSyncBPM()">同步BPM</button>
    </div>

    <div class="table-scroll">
      <table class="data-table" id="dataTable">
        <thead>
          <tr>
            <th style="width:40px;"><input type="checkbox" id="checkAll" onclick="toggleAll(this)"></th>
            <th>序号</th>
            <th>申请编号</th>
            <th>流程编号</th>
            <th>联系电话</th>
            <th>申请地</th>
            <th>档案类型</th>
            <th>法人姓名</th>
            <th>法人信息选择</th>
            <th>档案性质</th>
            <th>借调档案名称</th>
            <th>借调总数</th>
            <th>借调用途</th>
            <th>状态</th>
            <th>创建人</th>
            <th>创建时间</th>
            <th>修改人</th>
            <th>修改时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="pagination">
      <span class="page-info">共 <strong id="totalCount">0</strong> 条</span>
      <span class="page-btn disabled">&laquo;</span>
      <span class="page-btn active">1</span>
      <span class="page-btn">&raquo;</span>
    </div>
  </div>

</div>

<script>
var mockData = JSON.parse(localStorage.getItem('legal_mockData') || 'null') || [
  { id:1, appNo:'SQ-FR-20260505001', procNo:'LC-FR-20260505001', phone:'13811112222', region:'北京', archType:'身份证', legalName:'张三', legalInfo:'法人代表身份证', archNature:'原件', archName:'法人身份证原件', total:2, purpose:'工商变更登记', status:'已审核', creator:'李四', createTime:'2026-05-05 08:30:00', modifier:'李四', modifyTime:'2026-05-15 16:00:00' },
  { id:2, appNo:'SQ-FR-20260520002', procNo:'LC-FR-20260520002', phone:'13922223333', region:'上海', archType:'护照', legalName:'王五', legalInfo:'法人护照信息', archNature:'复印件', archName:'法人护照复印件', total:3, purpose:'海外业务拓展', status:'审核中', creator:'赵六', createTime:'2026-05-20 13:00:00', modifier:'', modifyTime:'' },
  { id:3, appNo:'SQ-FR-20260528003', procNo:'', phone:'13733334444', region:'广州', archType:'营业执照', legalName:'孙七', legalInfo:'公司营业执照副本', archNature:'副本', archName:'营业执照副本', total:1, purpose:'银行开户材料', status:'已提交', creator:'周八', createTime:'2026-05-28 11:00:00', modifier:'', modifyTime:'' },
  { id:4, appNo:'SQ-FR-20260601004', procNo:'', phone:'13644445555', region:'深圳', archType:'其他证件', legalName:'吴九', legalInfo:'法人授权委托书', archNature:'原件', archName:'授权委托书', total:1, purpose:'诉讼代理', status:'初始', creator:'郑十', createTime:'2026-06-01 09:00:00', modifier:'', modifyTime:'' }
];

function renderTable(data) {
  var tbody = document.getElementById('tableBody');
  var html = '';
  if (data.length === 0) {
    html = '<tr><td colspan="19" class="empty-state"><span class="empty-icon">&#128203;</span><div class="empty-text">暂无数据</div><div class="empty-hint">点击「+ 新增申请」创建记录</div></td></tr>';
  } else {
    data.forEach(function(row, index) {
      html += '<tr class="' + (row._checked ? 'row-selected' : '') + '">';
      html += '<td><input type="checkbox" class="row-check" value="' + row.id + '" ' + (row._checked ? 'checked' : '') + ' onclick="toggleRow(this,' + row.id + ')"></td>';
      html += '<td>' + (index+1) + '</td>';
      html += '<td>' + esc(row.appNo) + '</td>';
      html += '<td>' + esc(row.procNo) + '</td>';
      html += '<td>' + esc(row.phone) + '</td>';
      html += '<td>' + esc(row.region) + '</td>';
      html += '<td>' + esc(row.archType) + '</td>';
      html += '<td>' + esc(row.legalName) + '</td>';
      html += '<td>' + esc(row.legalInfo) + '</td>';
      html += '<td>' + esc(row.archNature) + '</td>';
      html += '<td>' + esc(row.archName) + '</td>';
      html += '<td>' + row.total + '</td>';
      html += '<td>' + esc(row.purpose) + '</td>';
      html += '<td>' + st(row.status) + '</td>';
      html += '<td>' + esc(row.creator) + '</td>';
      html += '<td>' + esc(row.createTime) + '</td>';
      html += '<td>' + esc(row.modifier||'-') + '</td>';
      html += '<td>' + esc(row.modifyTime||'-') + '</td>';
      html += '<td class="col-actions">';
      html += '<a class="link-action" href="detail.html?id='+row.id+'&mode=edit">编辑</a>';
      html += '<a class="link-action" href="detail.html?id='+row.id+'&mode=view">查看</a>';
      html += '<a class="link-action danger" href="javascript:void(0)" onclick="doDel('+row.id+')">删除</a>';
      html += '</td></tr>';
    });
  }
  tbody.innerHTML = html;
  document.getElementById('totalCount').textContent = data.length;
  document.getElementById('checkAll').checked = false;
}
function toggleAll(el) {
  var checks = document.querySelectorAll('.row-check');
  checks.forEach(function(c) { 
    c.checked = el.checked; 
    var tr = c.closest('tr');
    if (tr) tr.classList.toggle('row-selected', el.checked);
  });
}
function toggleRow(el, id) {
  var tr = el.closest('tr');
  if (tr) tr.classList.toggle('row-selected', el.checked);
  updateCheckAll();
}
function updateCheckAll() {
  var all = document.querySelectorAll('.row-check');
  var checked = document.querySelectorAll('.row-check:checked');
  document.getElementById('checkAll').checked = all.length > 0 && all.length === checked.length;
}
function getCheckedIds() {
  var ids = [];
  document.querySelectorAll('.row-check:checked').forEach(function(c) { ids.push(c.value); });
  return ids;
}
function st(s) { var m={'初始':'initial','已提交':'submitted','审核中':'reviewing','已审核':'approved','已取消':'cancelled'}; return '<span class="status-tag '+(m[s]||'')+'">'+s+'</span>'; }
function esc(s) { if(!s) return ''; var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function doSearch() {
  var n=document.getElementById('sName').value.trim(), r=document.getElementById('sRegion').value, t=document.getElementById('sArchType').value, s=document.getElementById('sStatus').value;
  var f=mockData.filter(function(x){
    if(n&&x.legalName.indexOf(n)<0) return false;
    if(r&&x.region!==r) return false;
    if(t&&x.archType!==t) return false;
    if(s&&x.status!==s) return false;
    return true;
  });
  renderTable(f);
  showSearchTags();
}
function resetSearch() {
  document.getElementById('sName').value=''; document.getElementById('sRegion').value=''; document.getElementById('sArchType').value=''; document.getElementById('sStatus').value='';
  renderTable(mockData);
  showSearchTags();
}

// 搜索条件标签
function showSearchTags() {
  var map = { sName:'法人姓名', sRegion:'申请地', sArchType:'档案类型', sStatus:'状态' };
  var tags = [];
  Object.keys(map).forEach(function(id) {
    var el = document.getElementById(id);
    if (el && el.value) {
      tags.push({ name: map[id], value: el.value, id: id });
    }
  });
  var container = document.getElementById('searchTags');
  if (!container) return;
  if (tags.length === 0) { container.style.display = 'none'; container.innerHTML = ''; return; }
  var html = '';
  tags.forEach(function(t) {
    html += '<span class="search-active-tag">' + t.name + '：' + t.value + '<span class="tag-remove" onclick="clearSearchTag(\'' + t.id + '\')">&times;</span></span>';
  });
  container.style.display = '';
  container.innerHTML = html;
}
function clearSearchTag(id) {
  document.getElementById(id).value = '';
  doSearch();
}
function goAdd() { location.href='detail.html?mode=add'; }
function doImport() { showToast('请选择 Excel 文件上传', 'info'); }
function doBatchSubmit() {
  var ids = getCheckedIds();
  if (ids.length === 0) { showToast('请先勾选需要提交的记录', 'error'); return; }
  if (confirm('确认批量提交选中的 ' + ids.length + ' 条记录？')) {
    mockData.forEach(function(r) {
      if (ids.indexOf(String(r.id)) >= 0 && (r.status === '初始' || r.status === '已取消')) {
        r.status = '已提交';
      }
    });
    localStorage.setItem('legal_mockData', JSON.stringify(mockData));
    resetSearch();
    showToast('批量提交成功', 'success');
  }
}
function doSyncBPM() { showToast('正在同步审批流程数据...', 'info'); }
function doDel(id) {
  if(confirm('确认删除？')) {
    mockData=mockData.filter(function(r){return r.id!==id;});
    localStorage.setItem('legal_mockData',JSON.stringify(mockData));
    renderTable(mockData);
    showToast('删除成功', 'success');
  }
}

// Toast 轻提示
function showToast(message, type) {
  type = type || 'info';
  var container = document.getElementById('toastContainer');
  if (!container) return;
  var toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(function() {
    if (toast.parentNode) {
      toast.style.opacity = '0';
      toast.style.transition = 'opacity 0.3s';
      setTimeout(function() { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 300);
    }
  }, 2500);
}
renderTable(mockData);
</script>
</body>
</html>
