<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店铺授权书 - 列表</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<div class="page-container">

  <!-- Toast 轻提示容器 -->
  <div id="toastContainer" class="toast-container"></div>

  <script>
    if (window.parent) {
      window.parent.postMessage({type:'breadcrumb', text:'店铺授权书 <span>/</span> 列表'}, '*');
    }
  </script>

  <div class="page-title">店铺授权书列表</div>

  <div class="search-area">
    <div class="search-row">
      <div class="search-item">
        <label>公司主体名称：</label>
        <input type="text" id="sCompany" placeholder="请输入公司主体名称">
      </div>
      <div class="search-item">
        <label>品牌：</label>
        <input type="text" id="sBrand" placeholder="请输入品牌">
      </div>
      <div class="search-item">
        <label>状态：</label>
        <select id="sStatus">
          <option value="">全部</option>
          <option value="初始">初始</option>
          <option value="已提交">已提交</option>
          <option value="已删除">已删除</option>
        </select>
      </div>
    </div>
    <div class="search-actions">
      <button class="btn btn-primary" onclick="doSearch()">查询</button>
      <button class="btn" onclick="resetSearch()">重置</button>
    </div>
    <div class="search-active-tags" id="searchTags" style="display:none;"></div>
  </div>

  <div class="table-area">
    <div class="table-toolbar">
      <button class="btn btn-primary" onclick="goAdd()">+ 新增申请</button>
      <button class="btn" onclick="doImport()">导入</button>
      <button class="btn btn-success" onclick="doBatchGenerate()">生成授权书</button>
    </div>

    <div class="table-scroll">
      <table class="data-table" id="dataTable">
        <thead>
          <tr>
            <th style="width:40px;"><input type="checkbox" id="checkAll" onclick="toggleAll(this)"></th>
            <th>序号</th>
            <th>申请编号</th>
            <th>公司主体名称</th>
            <th>品牌</th>
            <th>商标注册证号</th>
            <th>授权公司主体名称</th>
            <th>授权日期</th>
            <th>状态</th>
            <th>创建人</th>
            <th>创建时间</th>
            <th>修改人</th>
            <th>修改时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="pagination">
      <span class="page-info">共 <strong id="totalCount">0</strong> 条</span>
      <span class="page-btn disabled">&laquo;</span>
      <span class="page-btn active">1</span>
      <span class="page-btn">&raquo;</span>
    </div>
  </div>

</div>

<script>
var mockData = JSON.parse(localStorage.getItem('auth_mockData') || 'null') || [
  { id:1, appNo:'SQ-ZQS-20260510001', companyName:'北京创新科技有限公司', brand:'创新科技', trademarkNo:'TM20231001', authCompany:'上海授权代理有限公司', authDate:'2026-05-10', status:'已提交', creator:'李四', createTime:'2026-05-10 09:00:00', modifier:'李四', modifyTime:'2026-05-18 11:00:00' },
  { id:2, appNo:'SQ-ZQS-20260522002', companyName:'上海智能网络有限公司', brand:'智联', trademarkNo:'TM20231205', authCompany:'北京知识产权服务中心', authDate:'2026-05-22', status:'已提交', creator:'赵六', createTime:'2026-05-22 14:30:00', modifier:'', modifyTime:'' },
  { id:3, appNo:'SQ-ZQS-20260528003', companyName:'广州数据服务有限公司', brand:'数服通', trademarkNo:'TM20240120', authCompany:'深圳商标代理机构', authDate:'2026-05-28', status:'已提交', creator:'周八', createTime:'2026-05-28 16:00:00', modifier:'', modifyTime:'' },
  { id:4, appNo:'SQ-ZQS-20260601004', companyName:'杭州云计算有限公司', brand:'云智', trademarkNo:'TM20240315', authCompany:'广州品牌管理公司', authDate:'2026-06-01', status:'初始', creator:'郑十', createTime:'2026-06-01 08:30:00', modifier:'', modifyTime:'' }
];

function renderTable(data) {
  var tbody = document.getElementById('tableBody');
  var html = '';
  if (data.length === 0) {
    html = '<tr><td colspan="15" class="empty-state"><span class="empty-icon">&#128203;</span><div class="empty-text">暂无数据</div><div class="empty-hint">点击「+ 新增申请」创建记录</div></td></tr>';
  } else {
    data.forEach(function(row, index) {
      html += '<tr class="' + (row._checked ? 'row-selected' : '') + '">';
      html += '<td><input type="checkbox" class="row-check" value="' + row.id + '" ' + (row._checked ? 'checked' : '') + ' onclick="toggleRow(this,' + row.id + ')"></td>';
      html += '<td>' + (index+1) + '</td>';
      html += '<td>' + esc(row.appNo) + '</td>';
      html += '<td>' + esc(row.companyName) + '</td>';
      html += '<td>' + esc(row.brand) + '</td>';
      html += '<td>' + esc(row.trademarkNo) + '</td>';
      html += '<td>' + esc(row.authCompany) + '</td>';
      html += '<td>' + esc(row.authDate) + '</td>';
      html += '<td>' + st(row.status) + '</td>';
      html += '<td>' + esc(row.creator) + '</td>';
      html += '<td>' + esc(row.createTime) + '</td>';
      html += '<td>' + esc(row.modifier||'-') + '</td>';
      html += '<td>' + esc(row.modifyTime||'-') + '</td>';
      html += '<td class="col-actions">';
      html += '<a class="link-action" href="detail.html?id='+row.id+'&mode=edit">编辑</a>';
      html += '<a class="link-action" href="detail.html?id='+row.id+'&mode=view">查看</a>';
      html += '<a class="link-action danger" href="javascript:void(0)" onclick="doDel('+row.id+')">删除</a>';
      html += '</td></tr>';
    });
  }
  tbody.innerHTML = html;
  document.getElementById('totalCount').textContent = data.length;
  document.getElementById('checkAll').checked = false;
}
function toggleAll(el) {
  var checks = document.querySelectorAll('.row-check');
  checks.forEach(function(c) { 
    c.checked = el.checked; 
    var tr = c.closest('tr');
    if (tr) tr.classList.toggle('row-selected', el.checked);
  });
}
function toggleRow(el, id) {
  var tr = el.closest('tr');
  if (tr) tr.classList.toggle('row-selected', el.checked);
  updateCheckAll();
}
function updateCheckAll() {
  var all = document.querySelectorAll('.row-check');
  var checked = document.querySelectorAll('.row-check:checked');
  document.getElementById('checkAll').checked = all.length > 0 && all.length === checked.length;
}
function getCheckedIds() {
  var ids = [];
  document.querySelectorAll('.row-check:checked').forEach(function(c) { ids.push(c.value); });
  return ids;
}
function st(s) { var m={'初始':'initial','已提交':'submitted','已删除':'cancelled'}; return '<span class="status-tag '+(m[s]||'')+'">'+s+'</span>'; }
function esc(s) { if(!s) return ''; var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function doSearch() {
  var n=document.getElementById('sCompany').value.trim(), b=document.getElementById('sBrand').value.trim(), s=document.getElementById('sStatus').value;
  var f=mockData.filter(function(x){
    if(n&&x.companyName.indexOf(n)<0) return false;
    if(b&&x.brand.indexOf(b)<0) return false;
    if(s&&x.status!==s) return false;
    return true;
  });
  renderTable(f);
  showSearchTags();
}
function resetSearch() {
  document.getElementById('sCompany').value=''; document.getElementById('sBrand').value=''; document.getElementById('sStatus').value='';
  renderTable(mockData);
  showSearchTags();
}

// 搜索条件标签
function showSearchTags() {
  var map = { sCompany:'公司主体名称', sBrand:'品牌', sStatus:'状态' };
  var tags = [];
  Object.keys(map).forEach(function(id) {
    var el = document.getElementById(id);
    if (el && el.value) {
      tags.push({ name: map[id], value: el.value, id: id });
    }
  });
  var container = document.getElementById('searchTags');
  if (!container) return;
  if (tags.length === 0) { container.style.display = 'none'; container.innerHTML = ''; return; }
  var html = '';
  tags.forEach(function(t) {
    html += '<span class="search-active-tag">' + t.name + '：' + t.value + '<span class="tag-remove" onclick="clearSearchTag(\'' + t.id + '\')">&times;</span></span>';
  });
  container.style.display = '';
  container.innerHTML = html;
}
function clearSearchTag(id) {
  document.getElementById(id).value = '';
  doSearch();
}
function goAdd() { location.href='detail.html?mode=add'; }
function doImport() { showToast('请选择 Excel 文件上传', 'info'); }
function doBatchGenerate() {
  var ids = getCheckedIds();
  if (ids.length === 0) { showToast('请先勾选需要生成授权书的记录', 'error'); return; }
  var allSubmitted = true;
  mockData.forEach(function(r) {
    if (ids.indexOf(String(r.id)) >= 0 && r.status !== '已提交') {
      allSubmitted = false;
    }
  });
  if (!allSubmitted) { showToast('选中的记录状态必须为“已提交”才允许生成授权书', 'error'); return; }
  if (confirm('确认为选中的 ' + ids.length + ' 条记录生成授权书？')) {
    showToast('授权书生成成功，共 ' + ids.length + ' 份', 'success');
  }
}
function doDel(id) {
  if(confirm('确认删除？')) {
    mockData=mockData.filter(function(r){return r.id!==id;});
    localStorage.setItem('auth_mockData',JSON.stringify(mockData));
    renderTable(mockData);
    showToast('删除成功', 'success');
  }
}

// Toast 轻提示
function showToast(message, type) {
  type = type || 'info';
  var container = document.getElementById('toastContainer');
  if (!container) return;
  var toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(function() {
    if (toast.parentNode) {
      toast.style.opacity = '0';
      toast.style.transition = 'opacity 0.3s';
      setTimeout(function() { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 300);
    }
  }, 2500);
}
renderTable(mockData);
</script>
</body>
</html>
