<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内容电商AI工作台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">

    <!-- ========== 顶部导航栏 ========== -->
    <header class="topnav">
      <div class="topnav-left">
        <div class="topnav-brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M16.3 4.2c.7 2.1 1.9 3.6 3.7 4.4v3.8a8.8 8.8 0 0 1-3.5-.9v4.9a6.2 6.2 0 1 1-6.2-6.2c.4 0 .8 0 1.2.1v3.9c-.4-.2-.8-.3-1.2-.3a2.4 2.4 0 1 0 2.4 2.4V4.2h3.6Z" fill="#fff"/></svg>
          </div>
          <span class="brand-name">内容电商AI工作台</span>
        </div>
        <div class="topnav-divider"></div>
        <nav class="topnav-menu" id="topnavMenu">
          <a class="topnav-item active" data-key="guide" onclick="toggleSidebar()">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>店铺引擎</span>
            <svg class="chevron-down" viewBox="0 0 24 24" width="12" height="12"><path d="m6 9 6 6 6-6"/></svg>
          </a>
        </nav>
      </div>
      <div class="topnav-right">
        <div class="topnav-search">
          <svg viewBox="0 0 24 24" width="15" height="15"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="输入内容查询" id="globalSearch">
        </div>
        <button class="topnav-icon-btn" title="通知">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notify-dot"></span>
        </button>
        <div class="topnav-user">
          <div class="user-avatar">U</div>
          <span class="user-name">管理员</span>
          <svg viewBox="0 0 24 24" width="14" height="14"><path d="m6 9 6 6 6-6"/></svg>
        </div>
      </div>
    </header>

    <!-- ========== 下方主体区 ========== -->
    <div class="app-body">

      <!-- 左侧菜单 -->
      <aside class="sidebar" id="sidebar">
        <a class="sidebar-item active" data-page="pages/guide/list.html" onclick="switchSidebar(this)">
          <svg viewBox="0 0 24 24" width="17" height="17"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          <span>开店指南</span>
        </a>
        <a class="sidebar-item" data-page="pages/phone/list.html" onclick="switchSidebar(this)">
          <svg viewBox="0 0 24 24" width="17" height="17"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          <span>电话号码申请</span>
        </a>
        <a class="sidebar-item" data-page="pages/license/list.html" onclick="switchSidebar(this)">
          <svg viewBox="0 0 24 24" width="17" height="17"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <span>营业执照申请</span>
        </a>
        <a class="sidebar-item" data-page="pages/legal/list.html" onclick="switchSidebar(this)">
          <svg viewBox="0 0 24 24" width="17" height="17"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span>法人证件申请</span>
        </a>
        <a class="sidebar-item" data-page="pages/auth/list.html" onclick="switchSidebar(this)">
          <svg viewBox="0 0 24 24" width="17" height="17"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span>店铺授权书</span>
        </a>
        <a class="sidebar-item" data-page="pages/seal/list.html" onclick="switchSidebar(this)">
          <svg viewBox="0 0 24 24" width="17" height="17"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/></svg>
          <span>公章使用申请</span>
        </a>
      </aside>

      <!-- 右侧主内容区 -->
      <main class="main-area">
        <div class="main-header">
          <div class="breadcrumb" id="breadcrumb">开店指南</div>
        </div>
        <div class="main-content">
          <iframe id="contentFrame" src="pages/guide/list.html?v=3"></iframe>
        </div>
      </main>

    </div>
  </div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // ===== 点击店铺引擎切换左侧菜单 =====
    function toggleSidebar() {
      var body = document.querySelector('.app-body');
      var btn = document.querySelector('.topnav-item[data-key="guide"]');
      body.classList.toggle('sidebar-hidden');
      btn.classList.toggle('sidebar-open');
    }

    // ===== 左侧菜单切换 =====
    function switchSidebar(el) {
      document.querySelectorAll('.sidebar-item').forEach(function(i) { i.classList.remove('active'); });
      el.classList.add('active');
      var page = el.getAttribute('data-page');
      loadFrame(page);
      var text = el.querySelector('span').textContent.trim();
      document.getElementById('breadcrumb').innerHTML = text;
    }

    // ===== 加载 iframe =====
    function loadFrame(page) {
      var frame = document.getElementById('contentFrame');
      frame.classList.remove('fade-in');
      void frame.offsetWidth;
      frame.src = page + '?v=' + Date.now();
      frame.classList.add('fade-in');
    }

    // ===== 监听 iframe postMessage 更新面包屑 =====
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'breadcrumb') {
        document.getElementById('breadcrumb').innerHTML = e.data.text;
      }
    });
  </script>
</body>
</html>
