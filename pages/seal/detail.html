<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公章使用申请 - 详情</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<div class="page-container">

  <!-- Toast 轻提示容器 -->
  <div id="toastContainer" class="toast-container"></div>

  <script>
    if (window.parent) {
      window.parent.postMessage({type:'breadcrumb', text:'公章使用申请 <span>/</span> 详情'}, '*');
    }
  </script>

  <div class="page-title" id="pageTitle">新增公章使用申请</div>

  <div class="form-area">
    <form id="mainForm">
      <div class="form-group">
        <div class="form-item">
          <label>申请编号：</label>
          <div class="form-control"><input type="text" id="appNo" readonly disabled placeholder="保存后自动生成"></div>
        </div>
        <div class="form-item">
          <label>流程编号：</label>
          <div class="form-control"><input type="text" id="procNo" readonly disabled placeholder="保存后自动生成"></div>
        </div>
        <div class="form-item">
          <label class="required">需求地：</label>
          <div class="form-control">
            <select id="region">
              <option value="">请选择</option>
              <option value="北京">北京</option><option value="上海">上海</option><option value="广州">广州</option><option value="深圳">深圳</option><option value="杭州">杭州</option>
            </select>
          </div>
        </div>
      </div>
      <div class="form-group">
        <div class="form-item">
          <label class="required">主体是否属于子公司：</label>
          <div class="form-control">
            <div class="radio-group">
              <label><input type="radio" name="isSubsidiary" value="否" checked onchange="toggleSubName()"> 否</label>
              <label><input type="radio" name="isSubsidiary" value="是" onchange="toggleSubName()"> 是</label>
            </div>
          </div>
        </div>
      </div>
      <div class="form-group">
        <div class="form-item" id="subNameItem" style="display:none;">
          <label class="required" id="subNameLabel">所属子公司名称：</label>
          <div class="form-control">
            <input type="text" id="subName" placeholder="请输入所属子公司名称">
          </div>
        </div>
        <div class="form-item">
          <label class="required">申请事项：</label>
          <div class="form-control">
            <input type="text" id="item" placeholder="请输入申请事项">
          </div>
        </div>
      </div>
      <div class="form-group">
        <div class="form-item">
          <label class="required">印章属性：</label>
          <div class="form-control">
            <select id="sealAttr">
              <option value="">请选择</option>
              <option value="公章">公章</option><option value="合同章">合同章</option><option value="财务章">财务章</option><option value="法人章">法人章</option><option value="发票章">发票章</option>
            </select>
          </div>
        </div>
        <div class="form-item">
          <label class="required">法人姓名：</label>
          <div class="form-control">
            <input type="text" id="legalName" placeholder="请输入法人姓名">
          </div>
        </div>
      </div>
      <div class="form-group">
        <div class="form-item full">
          <label class="required">使用用途：</label>
          <div class="form-control">
            <textarea id="purpose" rows="3" placeholder="请输入使用用途"></textarea>
          </div>
        </div>
      </div>
      <div class="form-group">
        <div class="form-item">
          <label>授权书上传：</label>
          <div class="form-control">
            <input type="file" id="authFile">
            <div class="tip-text">支持 PDF、JPG、PNG 格式，大小不超过 10MB</div>
          </div>
        </div>
        <div class="form-item" id="existingFileItem" style="display:none;">
          <label>已上传文件：</label>
          <div class="form-control" style="padding-top:7px;">
            <a class="link-action" id="existingFileLink" href="javascript:void(0)"></a>
          </div>
        </div>
      </div>

      <div class="form-group" id="cf1" style="display:none;">
        <div class="form-item"><label>创建人：</label><div class="form-control"><input type="text" id="creator" readonly disabled></div></div>
        <div class="form-item"><label>创建时间：</label><div class="form-control"><input type="text" id="createTime" readonly disabled></div></div>
      </div>
      <div class="form-group" id="cf2" style="display:none;">
        <div class="form-item"><label>修改人：</label><div class="form-control"><input type="text" id="modifier" readonly disabled></div></div>
        <div class="form-item"><label>修改时间：</label><div class="form-control"><input type="text" id="modifyTime" readonly disabled></div></div>
      </div>
      <div class="form-group" id="cf3" style="display:none;">
        <div class="form-item"><label>状态：</label><div class="form-control">
          <select id="status" disabled>
            <option value="初始">初始</option><option value="已提交">已提交</option><option value="审核中">审核中</option><option value="已审核">已审核</option><option value="已取消">已取消</option>
          </select>
        </div></div>
      </div>

      <div class="form-actions" id="formActions">
        <button type="button" class="btn btn-primary" onclick="doSubmit()">提交</button>
        <button type="button" class="btn btn-success" id="saveBtn" style="display:none;" onclick="doSave()">保存</button>
        <button type="button" class="btn" onclick="goBack()">返回</button>
      </div>
    </form>
  </div>

  <!-- 操作日志 -->
  <div class="operation-log" id="opLog" style="display:none;">
    <div class="operation-log-title">操作日志</div>
    <div class="operation-log-list" id="logList"></div>
  </div>

</div>

<script>
var mockData = JSON.parse(localStorage.getItem('seal_mockData') || 'null') || [
  { id:1, appNo:'SQ-GZ-20260510001', procNo:'LC-GZ-20260510001', region:'北京', isSubsidiary:'否', subName:'-', item:'合同盖章', sealAttr:'公章', legalName:'张三', purpose:'签署战略合作协议', authFile:'授权书_20260510.pdf', status:'已审核', creator:'李四', createTime:'2026-05-10 09:00:00', modifier:'李四', modifyTime:'2026-05-18 11:00:00', logs:[
    {action:'创建申请', time:'2026-05-10 09:00:00', operator:'李四', detail:'新建公章使用申请单'},
    {action:'提交审核', time:'2026-05-10 09:30:00', operator:'李四', detail:'提交至审批流程'},
    {action:'审核通过', time:'2026-05-18 11:00:00', operator:'李四', detail:'审批通过，流程结束'}
  ]},
  { id:2, appNo:'SQ-GZ-20260522002', procNo:'LC-GZ-20260522002', region:'上海', isSubsidiary:'是', subName:'上海智能网络子公司', item:'财务文件盖章', sealAttr:'财务章', legalName:'王五', purpose:'银行开户文件', authFile:'', status:'审核中', creator:'赵六', createTime:'2026-05-22 14:30:00', modifier:'', modifyTime:'', logs:[
    {action:'创建申请', time:'2026-05-22 14:30:00', operator:'赵六', detail:'新建公章使用申请单'},
    {action:'提交审核', time:'2026-05-22 15:00:00', operator:'赵六', detail:'提交至审批流程'},
    {action:'审核中', time:'2026-05-22 16:00:00', operator:'系统', detail:'等待审批人处理'}
  ]}
];

function g(name) { var r = location.search.match(new RegExp('[?&]'+name+'=([^&]*)')); return r ? decodeURIComponent(r[1]) : ''; }
var mode = g('mode') || 'add';
var editId = parseInt(g('id')) || 0;

// 切换子公司输入框显示
function toggleSubName() {
  var isSub = document.querySelector('input[name="isSubsidiary"]:checked').value;
  document.getElementById('subNameItem').style.display = isSub === '是' ? '' : 'none';
  if (isSub === '否') {
    document.getElementById('subName').value = '';
    document.getElementById('subNameLabel').classList.remove('required');
  } else {
    document.getElementById('subNameLabel').classList.add('required');
  }
}

function init() {
  var rd = mode === 'view';
  if (rd) { document.getElementById('pageTitle').textContent = '查看公章使用申请'; setRO(true); document.getElementById('formActions').innerHTML = '<button type="button" class="btn" onclick="goBack()">返回</button>'; }
  else if (mode === 'edit') { document.getElementById('pageTitle').textContent = '编辑公章使用申请'; document.getElementById('saveBtn').style.display = ''; }
  if ((mode === 'edit' || rd) && editId > 0) {
    var rec = mockData.find(function(r){return r.id===editId;});
    if (rec) {
      document.getElementById('appNo').value = rec.appNo || '';
      document.getElementById('procNo').value = rec.procNo || '';
      document.getElementById('region').value = rec.region;
      // 设置单选按钮
      document.querySelector('input[name="isSubsidiary"][value="'+rec.isSubsidiary+'"]').checked = true;
      document.getElementById('subName').value = rec.subName === '-' ? '' : rec.subName;
      document.getElementById('item').value = rec.item;
      document.getElementById('sealAttr').value = rec.sealAttr;
      document.getElementById('legalName').value = rec.legalName;
      document.getElementById('purpose').value = rec.purpose;
      document.getElementById('status').value = rec.status;
      toggleSubName();
      // 已有文件
      if (rec.authFile) {
        document.getElementById('existingFileItem').style.display = '';
        document.getElementById('existingFileLink').textContent = rec.authFile;
      }
      showCF(['cf1','cf2','cf3']);
      document.getElementById('creator').value = rec.creator;
      document.getElementById('createTime').value = rec.createTime;
      document.getElementById('modifier').value = rec.modifier || '';
      document.getElementById('modifyTime').value = rec.modifyTime || '';
      renderLog(rec.logs || []);
    }
  }
}
function showCF(ids) { ids.forEach(function(id){ document.getElementById(id).style.display = ''; }); }
function setRO(v) {
  document.querySelectorAll('#mainForm input:not([type="button"]):not([type="radio"]), #mainForm select, #mainForm textarea').forEach(function(el){ el.disabled = v; });
  if (v) {
    document.querySelectorAll('input[type="radio"]').forEach(function(el){ el.disabled = true; });
  }
}
function gData() {
  var isSub = document.querySelector('input[name="isSubsidiary"]:checked').value;
  return {
    region: document.getElementById('region').value,
    isSubsidiary: isSub,
    subName: isSub === '是' ? document.getElementById('subName').value.trim() : '-',
    item: document.getElementById('item').value.trim(),
    sealAttr: document.getElementById('sealAttr').value,
    legalName: document.getElementById('legalName').value.trim(),
    purpose: document.getElementById('purpose').value.trim(),
    authFile: document.getElementById('authFile').value ? document.getElementById('authFile').files[0].name : ''
  };
}
function validate() {
  document.querySelectorAll('.has-error').forEach(function(el) { el.classList.remove('has-error'); });
  var isSub = document.querySelector('input[name="isSubsidiary"]:checked').value;
  var fs = [{id:'region',n:'需求地'},{id:'item',n:'申请事项'},{id:'sealAttr',n:'印章属性'},{id:'legalName',n:'法人姓名'},{id:'purpose',n:'使用用途'}];
  if (isSub === '是') fs.push({id:'subName',n:'所属子公司名称'});
  var fe = null;
  for (var i=0;i<fs.length;i++) {
    var el = document.getElementById(fs[i].id);
    if (!el.value.toString().trim()) {
      var p = el.closest('.form-control'); if(p) p.classList.add('has-error');
      if(!fe) fe=el;
    }
  }
  if(fe){ showToast('请完善表单中的必填项','error'); fe.focus(); return false; }
  return true;
}
function doSubmit() { if(!validate()) return; var d=gData(); d.status='已提交'; saveData(d); showToast('提交成功','success'); goBack(); }
function doSave() { if(!validate()) return; var d=gData(); d.status=document.getElementById('status').value||'初始'; saveData(d); showToast('保存成功','success'); goBack(); }
function saveData(d) {
  if (mode==='add') {
    d.id=mockData.length>0?Math.max.apply(null,mockData.map(function(r){return r.id;}))+1:1;
    d.appNo='SQ-GZ-'+new Date().toISOString().slice(0,10).replace(/-/g,'')+String(d.id).padStart(3,'0');
    d.procNo='LC-GZ-'+new Date().toISOString().slice(0,10).replace(/-/g,'')+String(d.id).padStart(3,'0');
    d.creator='当前用户'; d.createTime=now(); d.modifier=''; d.modifyTime='';
    mockData.push(d);
  } else {
    var idx=mockData.findIndex(function(r){return r.id===editId;});
    if(idx>=0){ d.id=editId; d.creator=mockData[idx].creator; d.createTime=mockData[idx].createTime; d.modifier='当前用户'; d.modifyTime=now(); mockData[idx]=d; }
  }
  localStorage.setItem('seal_mockData',JSON.stringify(mockData));
}
function now(){ return new Date().toLocaleString('zh-CN',{hour12:false}).replace(/\//g,'-'); }
function goBack(){ location.href='list.html'; }
function renderLog(logs) {
  if (!logs || logs.length === 0) return;
  var c = document.getElementById('opLog');
  var l = document.getElementById('logList');
  c.style.display = '';
  var h = '';
  logs.forEach(function(log) {
    h += '<div class="operation-log-item">';
    h += '<div class="operation-log-header"><span class="operation-log-action">' + esc(log.action) + '</span><span class="operation-log-time">' + esc(log.time) + '</span></div>';
    h += '<div class="operation-log-detail">' + esc(log.detail) + '</div>';
    h += '<div class="operation-log-operator">操作人：' + esc(log.operator) + '</div>';
    h += '</div>';
  });
  l.innerHTML = h;
}
function esc(s) { if(!s) return ''; var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
init();

// Toast 轻提示
function showToast(message, type) {
  type = type || 'info';
  var container = document.getElementById('toastContainer');
  if (!container) return;
  var toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(function() {
    if (toast.parentNode) {
      toast.style.opacity = '0';
      toast.style.transition = 'opacity 0.3s';
      setTimeout(function() { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 300);
    }
  }, 2500);
}
</script>
</body>
</html>
