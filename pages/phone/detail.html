<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电话号码申请 - 详情</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<div class="page-container">

  <!-- Toast 轻提示容器 -->
  <div id="toastContainer" class="toast-container"></div>

  <script>
    if (window.parent) {
      window.parent.postMessage({type:'breadcrumb', text:'电话号码申请 <span>/</span> 详情'}, '*');
    }
  </script>

  <div class="page-title" id="pageTitle">新增电话号码申请</div>

  <!-- 表单区域 -->
  <div class="form-area">
    <form id="phoneForm">
      <div class="form-group">
        <div class="form-item">
          <label>申请编号：</label>
          <div class="form-control">
            <input type="text" id="appNo" readonly disabled placeholder="保存后自动生成">
          </div>
        </div>
        <div class="form-item">
          <label>流程编号：</label>
          <div class="form-control">
            <input type="text" id="procNo" readonly disabled placeholder="保存后自动生成">
          </div>
        </div>
        <div class="form-item">
          <label class="required">公司名称：</label>
          <div class="form-control">
            <select id="companyName">
              <option value="">请选择</option>
              <option value="北京星辰科技有限公司">北京星辰科技有限公司</option>
              <option value="上海云途贸易有限公司">上海云途贸易有限公司</option>
              <option value="广州鼎盛电子商务有限公司">广州鼎盛电子商务有限公司</option>
              <option value="深圳前海数码科技有限公司">深圳前海数码科技有限公司</option>
              <option value="杭州西湖信息技术有限公司">杭州西湖信息技术有限公司</option>
            </select>
          </div>
        </div>
      </div>
      <div class="form-group">
        <div class="form-item">
          <label class="required">使用属地：</label>
          <div class="form-control">
            <select id="region">
              <option value="">请选择</option>
              <option value="北京">北京</option>
              <option value="上海">上海</option>
              <option value="广州">广州</option>
              <option value="深圳">深圳</option>
              <option value="杭州">杭州</option>
            </select>
          </div>
        </div>
      </div>
      <div class="form-group">
        <div class="form-item">
          <label class="required">申请电话类型：</label>
          <div class="form-control">
            <select id="phoneType">
              <option value="">请选择</option>
              <option value="固定电话">固定电话</option>
              <option value="移动电话">移动电话</option>
              <option value="400热线">400热线</option>
            </select>
          </div>
        </div>
      </div>
      <div class="form-group">
        <div class="form-item">
          <label class="required">申请事件类型：</label>
          <div class="form-control">
            <select id="eventType">
              <option value="">请选择</option>
              <option value="新装">新装</option>
              <option value="移机">移机</option>
              <option value="过户">过户</option>
              <option value="注销">注销</option>
            </select>
          </div>
        </div>
        <div class="form-item">
          <label class="required">运营商：</label>
          <div class="form-control">
            <select id="operator">
              <option value="">请选择</option>
              <option value="中国电信">中国电信</option>
              <option value="中国移动">中国移动</option>
              <option value="中国联通">中国联通</option>
            </select>
          </div>
        </div>
      </div>
      <div class="form-group">
        <div class="form-item">
          <label class="required">号码实名人：</label>
          <div class="form-control">
            <input type="text" id="realName" placeholder="请输入号码实名人姓名">
          </div>
        </div>
        <div class="form-item">
          <label class="required">实名人身份证号：</label>
          <div class="form-control">
            <input type="text" id="realIdCard" placeholder="请输入实名人身份证号">
          </div>
        </div>
      </div>
      <div class="form-group">
        <div class="form-item">
          <label class="required">实名人手机号：</label>
          <div class="form-control">
            <input type="text" id="realPhone" placeholder="请输入实名人手机号">
          </div>
        </div>
        <div class="form-item">
          <label class="required">使用人：</label>
          <div class="form-control">
            <input type="text" id="user" placeholder="请输入使用人姓名">
          </div>
        </div>
      </div>
      <div class="form-group">
        <div class="form-item full">
          <label class="required">申请理由：</label>
          <div class="form-control">
            <textarea id="reason" rows="3" placeholder="请输入申请理由"></textarea>
          </div>
        </div>
      </div>

      <!-- 公共字段（编辑/查看模式展示） -->
      <div class="form-group" id="commonFields" style="display:none;">
        <div class="form-item">
          <label>创建人：</label>
          <div class="form-control">
            <input type="text" id="creator" readonly disabled>
          </div>
        </div>
        <div class="form-item">
          <label>创建时间：</label>
          <div class="form-control">
            <input type="text" id="createTime" readonly disabled>
          </div>
        </div>
      </div>
      <div class="form-group" id="commonFields2" style="display:none;">
        <div class="form-item">
          <label>修改人：</label>
          <div class="form-control">
            <input type="text" id="modifier" readonly disabled>
          </div>
        </div>
        <div class="form-item">
          <label>修改时间：</label>
          <div class="form-control">
            <input type="text" id="modifyTime" readonly disabled>
          </div>
        </div>
      </div>
      <div class="form-group" id="commonFields3" style="display:none;">
        <div class="form-item">
          <label>状态：</label>
          <div class="form-control">
            <select id="status" disabled>
              <option value="初始">初始</option>
              <option value="已提交">已提交</option>
              <option value="审核中">审核中</option>
              <option value="已审核">已审核</option>
              <option value="已取消">已取消</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 操作按钮 -->
      <div class="form-actions" id="formActions">
        <button type="button" class="btn btn-primary" onclick="doSubmit()">提交</button>
        <button type="button" class="btn btn-success" id="saveBtn" style="display:none;" onclick="doSave()">保存</button>
        <button type="button" class="btn" onclick="goBack()">返回</button>
      </div>
    </form>
  </div>

  <!-- 操作日志 -->
  <div class="operation-log" id="operationLog" style="display:none;">
    <div class="operation-log-title">操作日志</div>
    <div class="operation-log-list" id="logList"></div>
  </div>

</div>

<script>
// 模拟数据存储（与列表页共享逻辑）
var mockData = JSON.parse(localStorage.getItem('phone_mockData') || 'null') || [
  { id:1, appNo:'SQ-DH-20260510001', procNo:'LC-DH-20260510001', companyName:'北京星辰科技有限公司', region:'北京', phoneType:'固定电话', eventType:'新装', reason:'新办公室业务需要', operator:'中国电信', realName:'张三', realIdCard:'110101199001011234', realPhone:'13800138001', user:'张三', status:'已审核', creator:'李四', createTime:'2026-05-10 10:30:00', modifier:'李四', modifyTime:'2026-05-20 14:00:00', logs:[
    {action:'创建申请', time:'2026-05-10 10:30:00', operator:'李四', detail:'新建电话号码申请单'},
    {action:'提交审核', time:'2026-05-10 11:00:00', operator:'李四', detail:'提交至审批流程'},
    {action:'审核通过', time:'2026-05-20 14:00:00', operator:'李四', detail:'审批通过，流程结束'}
  ]},
  { id:2, appNo:'SQ-DH-20260522002', procNo:'LC-DH-20260522002', companyName:'上海云途贸易有限公司', region:'上海', phoneType:'移动电话', eventType:'移机', reason:'办公地址搬迁', operator:'中国移动', realName:'王五', realIdCard:'310101198505052345', realPhone:'13900139002', user:'赵六', status:'审核中', creator:'李四', createTime:'2026-05-22 09:15:00', modifier:'', modifyTime:'', logs:[
    {action:'创建申请', time:'2026-05-22 09:15:00', operator:'李四', detail:'新建电话号码申请单'},
    {action:'提交审核', time:'2026-05-22 09:30:00', operator:'李四', detail:'提交至审批流程'},
    {action:'审核中', time:'2026-05-22 14:00:00', operator:'系统', detail:'等待审批人处理'}
  ]},
  { id:3, appNo:'SQ-DH-20260528003', procNo:'LC-DH-20260528003', companyName:'广州鼎盛电子商务有限公司', region:'广州', phoneType:'400热线', eventType:'新装', reason:'客户服务热线需求', operator:'中国联通', realName:'孙七', realIdCard:'440101199203034567', realPhone:'13700137003', user:'孙七', status:'已提交', creator:'周八', createTime:'2026-05-28 16:45:00', modifier:'', modifyTime:'', logs:[
    {action:'创建申请', time:'2026-05-28 16:45:00', operator:'周八', detail:'新建电话号码申请单'},
    {action:'提交审核', time:'2026-05-28 17:00:00', operator:'周八', detail:'提交至审批流程'}
  ]}
];

function getQueryParam(name) {
  var result = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
  return result ? decodeURIComponent(result[1]) : '';
}

var mode = getQueryParam('mode') || 'add';
var editId = parseInt(getQueryParam('id')) || 0;

// 初始化页面
function initPage() {
  var isReadonly = false;
  if (mode === 'view') {
    document.getElementById('pageTitle').textContent = '查看电话号码申请';
    isReadonly = true;
  } else if (mode === 'edit') {
    document.getElementById('pageTitle').textContent = '编辑电话号码申请';
    document.getElementById('saveBtn').style.display = '';
  } else {
    document.getElementById('pageTitle').textContent = '新增电话号码申请';
  }

  // 设置只读
  if (isReadonly) {
    setFormReadonly(true);
    document.getElementById('formActions').innerHTML = '<button type="button" class="btn" onclick="goBack()">返回</button>';
  }

  // 加载数据
  if ((mode === 'edit' || mode === 'view') && editId > 0) {
    var record = mockData.find(function(r) { return r.id === editId; });
    if (record) {
      document.getElementById('appNo').value = record.appNo || '';
      document.getElementById('procNo').value = record.procNo || '';
      document.getElementById('companyName').value = record.companyName || '';
      document.getElementById('region').value = record.region;
      document.getElementById('phoneType').value = record.phoneType;
      document.getElementById('eventType').value = record.eventType;
      document.getElementById('operator').value = record.operator;
      document.getElementById('realName').value = record.realName;
      document.getElementById('realIdCard').value = record.realIdCard;
      document.getElementById('realPhone').value = record.realPhone;
      document.getElementById('user').value = record.user;
      document.getElementById('reason').value = record.reason;
      document.getElementById('status').value = record.status;

      // 显示公共字段
      document.getElementById('commonFields').style.display = '';
      document.getElementById('commonFields2').style.display = '';
      document.getElementById('commonFields3').style.display = '';
      document.getElementById('creator').value = record.creator;
      document.getElementById('createTime').value = record.createTime;
      document.getElementById('modifier').value = record.modifier || '';
      document.getElementById('modifyTime').value = record.modifyTime || '';

      // 渲染操作日志
      renderOperationLog(record.logs || []);
    }
  }
}

function setFormReadonly(readonly) {
  var inputs = document.querySelectorAll('#phoneForm input:not([type="button"]), #phoneForm select, #phoneForm textarea');
  inputs.forEach(function(el) {
    el.disabled = readonly;
  });
}

// 表单提交
function doSubmit() {
  if (!validateForm()) return;
  var data = getFormData();
  data.status = '已提交';
  if (mode === 'add') {
    data.id = mockData.length > 0 ? Math.max.apply(null, mockData.map(function(r) { return r.id; })) + 1 : 1;
    data.appNo = 'SQ-DH-' + new Date().toISOString().slice(0,10).replace(/-/g,'') + String(data.id).padStart(3,'0');
    data.procNo = 'LC-DH-' + new Date().toISOString().slice(0,10).replace(/-/g,'') + String(data.id).padStart(3,'0');
    data.creator = '当前用户';
    data.createTime = new Date().toLocaleString('zh-CN', {hour12: false}).replace(/\//g, '-');
    data.modifier = '';
    data.modifyTime = '';
    mockData.push(data);
  } else if (mode === 'edit') {
    var idx = mockData.findIndex(function(r) { return r.id === editId; });
    if (idx >= 0) {
      data.id = editId;
      data.creator = mockData[idx].creator;
      data.createTime = mockData[idx].createTime;
      data.modifier = '当前用户';
      data.modifyTime = new Date().toLocaleString('zh-CN', {hour12: false}).replace(/\//g, '-');
      mockData[idx] = data;
    }
  }
  localStorage.setItem('phone_mockData', JSON.stringify(mockData));
  showToast('提交成功', 'success');
  goBack();
}

function doSave() {
  if (!validateForm()) return;
  var data = getFormData();
  data.status = document.getElementById('status').value || '初始';
  var idx = mockData.findIndex(function(r) { return r.id === editId; });
  if (idx >= 0) {
    data.id = editId;
    data.creator = mockData[idx].creator;
    data.createTime = mockData[idx].createTime;
    data.modifier = '当前用户';
    data.modifyTime = new Date().toLocaleString('zh-CN', {hour12: false}).replace(/\//g, '-');
    mockData[idx] = data;
    localStorage.setItem('phone_mockData', JSON.stringify(mockData));
    showToast('保存成功', 'success');
    goBack();
  }
}

function getFormData() {
  return {
    companyName: document.getElementById('companyName').value,
    region: document.getElementById('region').value,
    phoneType: document.getElementById('phoneType').value,
    eventType: document.getElementById('eventType').value,
    reason: document.getElementById('reason').value,
    operator: document.getElementById('operator').value,
    realName: document.getElementById('realName').value,
    realIdCard: document.getElementById('realIdCard').value,
    realPhone: document.getElementById('realPhone').value,
    user: document.getElementById('user').value,
    status: '已提交'
  };
}

function validateForm() {
  // 清除所有错误状态
  document.querySelectorAll('.has-error').forEach(function(el) { el.classList.remove('has-error'); });
  var fields = [
    { id: 'companyName', name: '公司名称' },
    { id: 'region', name: '使用属地' },
    { id: 'phoneType', name: '申请电话类型' },
    { id: 'eventType', name: '申请事件类型' },
    { id: 'operator', name: '运营商' },
    { id: 'realName', name: '号码实名人' },
    { id: 'realIdCard', name: '实名人身份证号' },
    { id: 'realPhone', name: '实名人手机号' },
    { id: 'user', name: '使用人' },
    { id: 'reason', name: '申请理由' }
  ];
  var firstError = null;
  for (var i = 0; i < fields.length; i++) {
    var el = document.getElementById(fields[i].id);
    if (!el.value.trim()) {
      var parent = el.closest('.form-control');
      if (parent) parent.classList.add('has-error');
      if (!firstError) firstError = el;
    }
  }
  if (firstError) {
    showToast('请完善表单中的必填项', 'error');
    firstError.focus();
    return false;
  }
  return true;
}

function goBack() {
  window.location.href = 'list.html';
}

// 渲染操作日志
function renderOperationLog(logs) {
  if (!logs || logs.length === 0) return;
  var container = document.getElementById('operationLog');
  var listEl = document.getElementById('logList');
  container.style.display = '';
  var html = '';
  logs.forEach(function(log) {
    html += '<div class="operation-log-item">';
    html += '<div class="operation-log-header">';
    html += '<span class="operation-log-action">' + escapeHtml(log.action) + '</span>';
    html += '<span class="operation-log-time">' + escapeHtml(log.time) + '</span>';
    html += '</div>';
    html += '<div class="operation-log-detail">' + escapeHtml(log.detail) + '</div>';
    html += '<div class="operation-log-operator">操作人：' + escapeHtml(log.operator) + '</div>';
    html += '</div>';
  });
  listEl.innerHTML = html;
}

// Toast 轻提示
function showToast(message, type) {
  type = type || 'info';
  var container = document.getElementById('toastContainer');
  if (!container) return;
  var toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(function() {
    if (toast.parentNode) {
      toast.style.opacity = '0';
      toast.style.transition = 'opacity 0.3s';
      setTimeout(function() { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 300);
    }
  }, 2500);
}

initPage();
</script>
</body>
</html>
