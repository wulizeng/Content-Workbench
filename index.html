<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内容电商AI工作台</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 主框架额外的样式 */
    .sidebar-menu-item .badge {
      margin-left: auto;
      background: rgba(255,255,255,0.15);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .main-header .user-info {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-secondary);
      font-size: 13px;
    }
    .main-header .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary) 0%, #818cf8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
    }
    /* iframe 切换淡入动画 */
    .main-content iframe {
      animation: none;
    }
    .main-content iframe.fade-in {
      animation: iframeFadeIn 0.35s ease both;
    }
    @keyframes iframeFadeIn {
      from { opacity: 0.4; }
      to { opacity: 1; }
    }
    /* 框架 toast 容器 */
    .toast-container { z-index: 99999; }
  </style>
</head>
<body>
  <div class="app-layout">

    <!-- 左侧菜单栏 -->
    <aside class="sidebar">
      <div class="sidebar-logo">内容电商AI工作台</div>
      <nav class="sidebar-menu" id="sidebarMenu">
        <a class="sidebar-menu-item active" data-page="pages/guide/list.html" onclick="switchPage(this)">
          <span class="menu-icon">&#128214;</span> <span class="menu-text">开店指南</span>
        </a>
        <a class="sidebar-menu-item" data-page="pages/phone/list.html" onclick="switchPage(this)">
          <span class="menu-icon">&#9742;</span> <span class="menu-text">电话号码申请</span>
        </a>
        <a class="sidebar-menu-item" data-page="pages/license/list.html" onclick="switchPage(this)">
          <span class="menu-icon">&#128203;</span> <span class="menu-text">营业执照申请【停用】</span>
        </a>
        <a class="sidebar-menu-item" data-page="pages/legal/list.html" onclick="switchPage(this)">
          <span class="menu-icon">&#128196;</span> <span class="menu-text">法人证件申请【停用】</span>
        </a>
        <a class="sidebar-menu-item" data-page="pages/auth/list.html" onclick="switchPage(this)">
          <span class="menu-icon">&#128220;</span> <span class="menu-text">店铺授权书</span>
        </a>
        <a class="sidebar-menu-item" data-page="pages/seal/list.html" onclick="switchPage(this)">
          <span class="menu-icon">&#128081;</span> <span class="menu-text">公章使用申请【停用】</span>
        </a>
      </nav>
      <div class="sidebar-toggle" onclick="toggleSidebar()" title="收缩/展开菜单">
        <span class="toggle-icon">&#10094;</span>
      </div>
    </aside>

    <!-- 右侧主内容区 -->
    <main class="main-area">
      <div class="main-header">
        <div class="breadcrumb" id="breadcrumb">开店指南 <span>/</span> 列表</div>
        <div class="user-info">
          <div class="user-avatar">U</div>
          <span>管理员</span>
        </div>
      </div>
      <div class="main-content">
        <iframe id="contentFrame" src="pages/guide/list.html?v=3"></iframe>
      </div>
    </main>

  </div>

  <script>
    // 菜单切换
    function switchPage(el) {
      document.querySelectorAll('.sidebar-menu-item').forEach(function(item) {
        item.classList.remove('active');
      });
      el.classList.add('active');

      var page = el.getAttribute('data-page');
      var frame = document.getElementById('contentFrame');
      frame.classList.remove('fade-in');
      // 强制 reflow 后重新触发动画
      void frame.offsetWidth;
      frame.src = page + '?v=' + Date.now();
      frame.classList.add('fade-in');

      var menuText = el.querySelector('.menu-text') ? el.querySelector('.menu-text').textContent.trim() : el.textContent.trim();
      document.getElementById('breadcrumb').innerHTML = menuText + ' <span>/</span> 列表';
    }

    // 侧边栏收缩/展开
    function toggleSidebar() {
      var sidebar = document.querySelector('.sidebar');
      sidebar.classList.toggle('collapsed');
      // 保存状态到 localStorage
      localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed') ? '1' : '0');
    }
    // 页面加载时恢复收缩状态
    (function() {
      if (localStorage.getItem('sidebarCollapsed') === '1') {
        document.querySelector('.sidebar').classList.add('collapsed');
      }
    })();

    // 监听 iframe 内页面通过 postMessage 更新面包屑
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'breadcrumb') {
        document.getElementById('breadcrumb').innerHTML = e.data.text;
      }
    });
  </script>
</body>
</html>
